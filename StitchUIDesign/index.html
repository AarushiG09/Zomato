<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>zomato AI | Galactic Gastronomy Dashboard</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel Standalone to compile JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <style>
        body {
            background-color: #0b0f19;
            color: #dfe2f1;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, rgba(255, 77, 109, 0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(0, 166, 224, 0.1) 0px, transparent 50%),
                        radial-gradient(at 50% 100%, rgba(255, 82, 96, 0.05) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .rose-gradient {
            background: linear-gradient(135deg, #ff4d6d 0%, #e6003a 100%);
        }
        .hover-lift {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(255, 77, 109, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .ai-border-glow {
            position: relative;
        }
        .ai-border-glow::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(90deg, transparent, #ff4d6d, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rotate-glow 4s linear infinite;
        }
        @keyframes rotate-glow {
            0% { filter: hue-rotate(0deg); opacity: 0.5; }
            100% { filter: hue-rotate(360deg); opacity: 0.8; }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#ff5260",
                        "surface-tint": "#ffb2b8",
                        "surface": "#0f131d",
                        "on-background": "#dfe2f1",
                        "surface-container": "#1c1f2a",
                        "primary-container": "#ff506f",
                        "tertiary": "#ffb3b3",
                        "on-secondary-container": "#00374d",
                        "secondary-fixed-dim": "#7bd0ff",
                        "primary-fixed-dim": "#ffb2b8",
                        "on-tertiary-container": "#5b0011",
                        "on-secondary-fixed": "#001e2c",
                        "on-error": "#690005",
                        "surface-container-highest": "#313540",
                        "surface-bright": "#353944",
                        "on-primary-fixed": "#40000f",
                        "on-surface-variant": "#e2bec0",
                        "surface-container-lowest": "#0a0e18",
                        "outline-variant": "#5a4042",
                        "error-container": "#93000a",
                        "outline": "#a9898b",
                        "on-tertiary": "#680015",
                        "inverse-on-surface": "#2c303b",
                        "surface-container-high": "#262a35",
                        "secondary-fixed": "#c4e7ff",
                        "surface-container-low": "#171b26",
                        "on-tertiary-fixed-variant": "#920021",
                        "surface-dim": "#0f131d",
                        "inverse-primary": "#ba1340",
                        "surface-variant": "#313540",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb3b3",
                        "error": "#ffb4ab",
                        "primary": "#ffb2b8",
                        "on-surface": "#dfe2f1",
                        "on-tertiary-fixed": "#400009",
                        "on-primary-fixed-variant": "#91002d",
                        "on-secondary-fixed-variant": "#004c69",
                        "background": "#0f131d",
                        "secondary": "#7bd0ff",
                        "on-primary-container": "#5b0019",
                        "primary-fixed": "#ffdadb",
                        "on-secondary": "#00354a",
                        "inverse-surface": "#dfe2f1",
                        "on-primary": "#67001e",
                        "tertiary-fixed": "#ffdad9",
                        "secondary-container": "#00a6e0"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "8px",
                        "gutter": "24px",
                        "xs": "4px",
                        "margin-desktop": "40px",
                        "sm": "12px",
                        "margin-mobile": "16px",
                        "md": "24px",
                        "lg": "48px",
                        "xl": "80px"
                    }
                }
            }
        }
    </script>
</head>
<body class="mesh-gradient min-h-screen selection:bg-primary/30">
    <div id="root"></div>

    <script type="text/babel">
        // Resolve the API URL dynamically depending on local vs production deployments
        const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? ''
            : 'https://zomato-production-79e2.up.railway.app'; // Replace this URL with your Railway service domain

        const RESTAURANT_IMAGES = [
            "https://lh3.googleusercontent.com/aida-public/AB6AXuAvn7xlypLSXim5VFe8GyN6v0s4RFt886aTXNGxc6r4VY-bOaupm3sSnq2Q4rZrlmD_ORyHVG4iUOE1iZa-SHHmQuKJF4e5CyE28RIkGv44JjA1Yd2IR6Ohm-OgHtvfUTYqickAc5XnDtBpFbPSSTHThBCfULSxzfxBsynKmTwDpRbJGwyUhZjAoMybqFwuXZnWMEvJ3uyxBEmjSVpsprA77msGTeaCpzabOJnJeMiHaRznW222ifdFhIrHt7qL62PBN47KnYpbFh7c",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuDgLwjxY956jS9dL9X5s26it0SWSULIV9tj9Bspd8foIcHch7EpXW-H8N-J97xJT0UPVnaYjh6maV7axEklkJu99IpQ5W31HSFEygvXOp9a-kmosX4vu30AjMm6SKUuMZv4LDGVske3gK3fu79AfeyVmxKsIUFbXGFvQQIdAM8X6xRNPniK00YbolJn5iKrqMrYc7es63NFId6B-nMiIinMyjOg4-HIK0cnxbXsq46qFhn-p0GVyugy7Bfa8v1Y2UUZrEW-29Kh5_tq",
            "https://lh3.googleusercontent.com/aida-public/AB6AXuDivFkRvlVYCacsAy2MH2Iwo4ZwHdL6t1xy_Y_XI7pwizg4_XjJdwIZyRrt6Rlt9mKAV2OSrGOaOiuc3ZQWsEW78ktJ4LxumcWL7az9KDjq00Phx3AI4Kx60tfJNVKsEElCu647xc2a0QoHGgbcuHY3jVtF1RCaoz0aLP-sfGJuUc31D90-CtKUFP62bhxnCcSCLgTT6CBtnHpiUqTPULiONk3qEPjjOERVfEuPWqylYtyLqNVS9GLjLzz-b4yFT8JQg3fchWfdshwQ"
        ];

        function App() {
            // Form State
            const [location, setLocation] = React.useState("Indiranagar");
            const [cuisine, setCuisine] = React.useState("North Indian");
            const [budget, setBudget] = React.useState("medium");
            const [minRating, setMinRating] = React.useState(4.0);
            const [topK, setTopK] = React.useState(5);
            const [additionalNotes, setAdditionalNotes] = React.useState("");
            const [useMock, setUseMock] = React.useState(false);

            // Interface Control State
            const [cities, setCities] = React.useState([
                "Indiranagar", "Koramangala 7th Block", "Bellandur", "Whitefield", 
                "BTM", "HSR", "Jayanagar", "JP Nagar", "Basavanagudi", 
                "Malleshwaram", "Electronic City", "Marathahalli", "Bannerghatta Road", "Brookefield"
            ]);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);
            const [response, setResponse] = React.useState(null);
            const [totalCandidates, setTotalCandidates] = React.useState(0);

            // Fetch cities list on boot
            React.useEffect(() => {
                fetch(`${BACKEND_URL}/api/v1/cities`)
                    .then(res => {
                        if (!res.ok) throw new Error("Could not load cities list");
                        return res.json();
                    })
                    .then(data => {
                        if (data && data.length > 0) {
                            setCities(data);
                            if (!data.includes(location)) {
                                setLocation(data[0]);
                            }
                        }
                    })
                    .catch(err => {
                        console.error("Failed to initialize localities listing dynamically, using defaults:", err);
                    });
            }, []);

            // Search execution handler
            const handleSearch = async () => {
                setLoading(true);
                setError(null);
                try {
                    const parsedAdditional = additionalNotes
                        .split(",")
                        .map(x => x.trim())
                        .filter(x => x.length > 0);

                    const res = await fetch(`${BACKEND_URL}/api/v1/recommendations`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            location,
                            budget,
                            cuisine,
                            min_rating: minRating,
                            additional: parsedAdditional,
                            top_k: topK,
                            use_mock: useMock
                        })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        if (res.status === 422) {
                            setError({ type: "validation", message: data.detail });
                        } else {
                            throw new Error(data.detail || "Pipeline invocation failed.");
                        }
                        setResponse(null);
                    } else {
                        setResponse(data);
                        setTotalCandidates(data.meta.candidates_considered);
                    }
                } catch (err) {
                    console.error(err);
                    setError({ type: "general", message: err.message });
                    setResponse(null);
                } finally {
                    setLoading(false);
                }
            };

            // Helper to render rating stars
            const renderStars = (rating) => {
                const fullStars = Math.round(rating);
                const emptyStars = 5 - fullStars;
                let stars = [];
                for (let i = 0; i < fullStars; i++) {
                    stars.push(<span key={`full-${i}`} className="material-symbols-outlined text-[18px] text-yellow-400" data-weight="fill">star</span>);
                }
                for (let i = 0; i < emptyStars; i++) {
                    stars.push(<span key={`empty-${i}`} className="material-symbols-outlined text-[18px] text-on-surface-variant/40">star_outline</span>);
                }
                return stars;
            };

            // Highlight preferences in the AI summary block
            const renderHighlightedSummary = (summary) => {
                if (!summary) return "No summary available.";
                let text = summary;
                if (cuisine) {
                    text = text.replaceAll(cuisine, `<span class="text-secondary font-semibold">${cuisine}</span>`);
                }
                if (location) {
                    text = text.replaceAll(location, `<span class="text-secondary font-semibold">${location}</span>`);
                }
                if (budget) {
                    const capitalBudget = budget.charAt(0).toUpperCase() + budget.slice(1);
                    text = text.replaceAll(capitalBudget, `<span class="text-primary font-bold">${capitalBudget}</span>`);
                }
                return <span dangerouslySetInnerHTML={{ __html: text }} />;
            };

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar Control Panel */}
                    <aside className="w-[320px] h-screen fixed left-0 top-0 bg-surface/65 backdrop-blur-xl border-r border-white/10 shadow-xl flex flex-col py-lg gap-md z-50">
                        <div className="px-md">
                            <h1 className="font-headline-md text-headline-md font-bold text-transparent bg-clip-text rose-gradient tracking-tight" style={{ WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>zomato AI</h1>
                            <p className="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-xs">Recommendation Assistant</p>
                        </div>
                        
                        <nav className="flex-1 overflow-y-auto px-md space-y-lg custom-scrollbar">
                            {/* Neighborhood selector */}
                            <div className="space-y-sm">
                                <label className="font-label-sm text-label-sm text-on-surface-variant uppercase block">Location</label>
                                <div className="relative">
                                    <select 
                                        value={location}
                                        onChange={(e) => setLocation(e.target.value)}
                                        className="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/50 appearance-none"
                                    >
                                        {cities.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <span className="material-symbols-outlined absolute right-3 top-3 text-on-surface-variant pointer-events-none">expand_more</span>
                                </div>
                            </div>

                            {/* Cuisine Input */}
                            <div className="space-y-sm">
                                <label className="font-label-sm text-label-sm text-on-surface-variant uppercase block">Cuisine</label>
                                <div className="relative">
                                    <input 
                                        type="text"
                                        value={cuisine}
                                        onChange={(e) => setCuisine(e.target.value)}
                                        placeholder="e.g. Italian, Japanese"
                                        className="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/50"
                                    />
                                    <span className="material-symbols-outlined absolute right-3 top-3 text-on-surface-variant">search</span>
                                </div>
                            </div>

                            {/* Budget capsule pills */}
                            <div className="space-y-sm">
                                <label className="font-label-sm text-label-sm text-on-surface-variant uppercase block">Budget</label>
                                <div className="flex gap-xs">
                                    {["low", "medium", "high"].map((tier) => (
                                        <button
                                            key={tier}
                                            type="button"
                                            onClick={() => setBudget(tier)}
                                            className={`flex-1 py-1 rounded-full border text-xs font-semibold capitalize transition-all ${
                                                budget === tier 
                                                    ? "bg-primary-container text-on-primary-container border-transparent shadow-lg shadow-primary/20"
                                                    : "border-outline-variant text-on-surface hover:bg-surface-container-highest"
                                            }`}
                                        >
                                            {tier}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Minimum Rating Slider */}
                            <div className="space-y-sm">
                                <div className="flex justify-between items-center">
                                    <label className="font-label-sm text-label-sm text-on-surface-variant uppercase">Min Rating</label>
                                    <span className="text-label-sm text-primary font-bold font-headline-md">{minRating.toFixed(1)}+</span>
                                </div>
                                <input 
                                    type="range"
                                    min="0.0"
                                    max="5.0"
                                    step="0.1"
                                    value={minRating}
                                    onChange={(e) => setMinRating(parseFloat(e.target.value))}
                                    className="w-full accent-primary h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            {/* Top K count Slider */}
                            <div className="space-y-sm">
                                <div className="flex justify-between items-center">
                                    <label className="font-label-sm text-label-sm text-on-surface-variant uppercase">Top K Results</label>
                                    <span className="text-label-sm text-primary font-bold font-headline-md">{topK}</span>
                                </div>
                                <input 
                                    type="range"
                                    min="1"
                                    max="20"
                                    value={topK}
                                    onChange={(e) => setTopK(parseInt(e.target.value))}
                                    className="w-full accent-primary h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            {/* Additional preferences free-text notes */}
                            <div className="space-y-sm">
                                <label className="font-label-sm text-label-sm text-on-surface-variant uppercase block">Notes</label>
                                <textarea 
                                    value={additionalNotes}
                                    onChange={(e) => setAdditionalNotes(e.target.value)}
                                    placeholder="e.g. rooftop, family friendly, evening ambiance"
                                    className="w-full h-24 bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/50 resize-none"
                                />
                            </div>

                            {/* Advanced setting option */}
                            <div className="pt-sm border-t border-white/5 space-y-sm">
                                <label className="font-label-sm text-label-sm text-on-surface-variant uppercase block">Advanced Settings</label>
                                <div className="flex items-center gap-xs">
                                    <input 
                                        type="checkbox"
                                        id="useMock"
                                        checked={useMock}
                                        onChange={(e) => setUseMock(e.target.checked)}
                                        className="rounded border-outline-variant bg-surface-container text-primary focus:ring-primary/50"
                                    />
                                    <label htmlFor="useMock" className="text-xs text-on-surface-variant select-none">Use Mock LLM Provider</label>
                                </div>
                            </div>
                        </nav>

                        {/* Search button trigger */}
                        <div className="px-md mt-auto pt-md border-t border-white/5">
                            <button 
                                onClick={handleSearch}
                                disabled={loading}
                                className="w-full rose-gradient text-white py-md rounded-xl font-headline-md text-headline-md shadow-xl shadow-primary/20 hover:scale-[0.98] transition-all flex items-center justify-center gap-base active:scale-95 disabled:opacity-50"
                            >
                                <span className="material-symbols-outlined animate-pulse">rocket_launch</span>
                                {loading ? "Searching..." : "Search"}
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Dashboard */}
                    <main className="ml-[320px] flex-1 min-h-screen p-margin-desktop space-y-lg">
                        {/* Header Area */}
                        <header className="flex justify-between items-end">
                            <div className="space-y-xs">
                                <h2 className="font-display-lg text-display-lg font-bold text-on-surface leading-tight" style={{ fontFamily: "'Outfit', sans-serif" }}>AI Restaurant Recommendation Engine</h2>
                                <div className="flex items-center gap-base text-on-surface-variant">
                                    <span className="material-symbols-outlined text-[18px]">verified_user</span>
                                    <span className="font-body-md text-body-md">Personalized gastronomic insights powered by Zomato Data Intelligence</span>
                                </div>
                            </div>
                            <div className="flex gap-md">
                                <button className="p-base rounded-full bg-surface-container-highest/50 hover:bg-surface-container-highest transition-colors relative">
                                    <span className="material-symbols-outlined">notifications</span>
                                    <span className="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full"></span>
                                </button>
                                <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-primary/20">
                                    <img alt="User profile" className="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8PMmbagmqJrEI3DBQbhltxSVAA-kpfSL9tDw5iHdXTBGYHzJbQWERbnncach2PrkG7zxtg6J8aQYG06u0ePQWgKRabBVrxXGDf4wyj1QKVbTT6NHuQBfdNg0WrPRBuLv_fJOZVHkpGSMWhHAied1zuzE21Ch77bi33p2cTZRRWAbnegKn-SrwwF_NkGedZHAu5bUCr6NLpLHlhbI3NHuYwBj2xJruEIlLnZXyqxQ1nOcYKprO291v71yAMCz2EVQbuz9kZzro8OLM"/>
                                </div>
                            </div>
                        </header>

                        {/* Persistent Analytics metrics grid */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-gutter">
                            <div className="glass-card p-md rounded-2xl flex flex-col justify-between">
                                <span className="font-label-sm text-label-sm text-on-surface-variant uppercase">Candidates Evaluated</span>
                                <div className="mt-base">
                                    <span className="font-metric-xl text-metric-xl text-on-surface" style={{ fontFamily: "'Outfit', sans-serif" }}>
                                        {response ? response.meta.candidates_considered.toLocaleString() : (loading ? "--" : "24,850")}
                                    </span>
                                    <span className="text-secondary font-label-sm ml-xs">+12% vs last search</span>
                                </div>
                            </div>
                            <div className="glass-card p-md rounded-2xl flex flex-col justify-between">
                                <span className="font-label-sm text-label-sm text-on-surface-variant uppercase">Engine Latency</span>
                                <div className="mt-base flex items-baseline gap-xs">
                                    <span className="font-metric-xl text-metric-xl text-secondary" style={{ fontFamily: "'Outfit', sans-serif" }}>
                                        {response && response.meta.llm_latency_ms ? response.meta.llm_latency_ms.toFixed(0) : "--"}
                                    </span>
                                    <span className="font-body-md text-body-md text-secondary/70">
                                        {response && response.meta.llm_latency_ms ? "ms" : ""}
                                    </span>
                                </div>
                            </div>
                            <div className="glass-card p-md rounded-2xl flex flex-col justify-between border-primary/20">
                                <span className="font-label-sm text-label-sm text-on-surface-variant uppercase">LLM Architecture</span>
                                <div className="mt-base">
                                    <div className="flex items-center gap-base">
                                        <span className="material-symbols-outlined text-primary">memory</span>
                                        <span className="font-headline-md text-headline-md text-on-surface" style={{ fontFamily: "'Outfit', sans-serif" }}>
                                            {response ? (response.meta.llm_model || "llama-3.3-70b") : "llama-3.3-70b"}
                                        </span>
                                    </div>
                                    <span className="font-label-sm text-label-sm text-on-surface-variant">
                                        {response ? (response.meta.llm_provider || "groq") : "groq-versatile"} / fallback: {response ? String(response.meta.llm_fallback) : "False"}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Rendering core content based on current state */}
                        {loading && (
                            <div className="glass-card p-12 rounded-[32px] text-center max-w-2xl mx-auto space-y-6 mt-12">
                                <span className="material-symbols-outlined text-[64px] text-primary animate-spin">cookie</span>
                                <h3 className="text-2xl font-bold text-on-surface" style={{ fontFamily: "'Outfit', sans-serif" }}>Cooking Recommendations</h3>
                                <p className="text-on-surface-variant text-base">
                                    Evaluating matching candidate venues and invoking Groq model pipelines...
                                </p>
                            </div>
                        )}

                        {!loading && error && (
                            <div className="glass-card p-8 rounded-2xl border border-red-500/30 bg-red-950/20 max-w-2xl mx-auto mt-12 space-y-4">
                                <div className="flex items-center gap-xs text-red-400">
                                    <span class="material-symbols-outlined">warning</span>
                                    <h4 className="font-bold text-lg">Error Processing Request</h4>
                                </div>
                                {error.type === "validation" ? (
                                    <ul className="list-disc pl-md text-on-surface-variant space-y-sm text-sm">
                                        {Object.entries(error.message).map(([field, msg]) => (
                                            <li key={field}><strong>{field}</strong>: {msg}</li>
                                        ))}
                                    </ul>
                                ) : (
                                    <p className="text-on-surface-variant text-sm">{error.message}</p>
                                )}
                            </div>
                        )}

                        {!loading && !error && response && (
                            <div className="space-y-lg">
                                {/* AI Summary banner */}
                                <section className="glass-card p-lg rounded-[32px] relative overflow-hidden group ai-border-glow">
                                    <div className="absolute inset-0 bg-secondary/5 blur-[80px] -z-10 group-hover:bg-secondary/10 transition-colors"></div>
                                    <div className="flex flex-col md:flex-row gap-lg items-center">
                                        <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-secondary to-primary flex items-center justify-center text-white shadow-2xl">
                                            <span className="material-symbols-outlined text-[40px]" data-weight="fill">auto_awesome</span>
                                        </div>
                                        <div className="flex-1 space-y-sm">
                                            <h3 className="font-headline-md text-headline-md text-on-surface" style={{ fontFamily: "'Outfit', sans-serif" }}>Intelligence Summary</h3>
                                            <p className="font-body-lg text-body-lg text-on-surface-variant max-w-3xl leading-relaxed">
                                                {renderHighlightedSummary(response.summary)}
                                            </p>
                                        </div>
                                        <div className="hidden lg:block w-[1px] h-24 bg-white/10"></div>
                                        <div className="flex flex-col items-center">
                                            <div className="relative w-20 h-20">
                                                <svg className="w-full h-full" viewBox="0 0 36 36">
                                                    <path className="text-white/10" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="2.5"></path>
                                                    <path className="text-primary" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeDasharray="98, 100" strokeLinecap="round" strokeWidth="2.5"></path>
                                                </svg>
                                                <div className="absolute inset-0 flex items-center justify-center font-bold text-on-surface text-lg">98%</div>
                                            </div>
                                            <span className="font-label-sm text-label-sm text-on-surface-variant mt-xs">Match Score</span>
                                        </div>
                                    </div>
                                </section>

                                {/* Recommendations Cards Grid */}
                                <section className="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-gutter">
                                    {response.recommendations.map((item, index) => {
                                        const r = item.restaurant;
                                        const imgUrl = RESTAURANT_IMAGES[index % RESTAURANT_IMAGES.length];
                                        return (
                                            <div key={r.id} className="glass-card rounded-3xl overflow-hidden hover-lift flex flex-col">
                                                <div className="h-56 relative overflow-hidden">
                                                    <img className="w-full h-full object-cover" src={imgUrl} alt={r.name}/>
                                                    <div className="absolute top-4 left-4 rose-gradient px-md py-xs rounded-lg font-bold text-white shadow-lg">#{item.rank} Rank</div>
                                                    <div className="absolute bottom-4 right-4 bg-black/60 backdrop-blur-md px-md py-xs rounded-full flex items-center gap-xs">
                                                        <span className="material-symbols-outlined text-secondary text-[16px]" data-weight="fill">verified</span>
                                                        <span className="text-label-sm text-white font-semibold">AI Choice</span>
                                                    </div>
                                                </div>
                                                <div className="p-md space-y-md flex-1 flex flex-col">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <h4 className="font-headline-md text-headline-md text-on-surface" style={{ fontFamily: "'Outfit', sans-serif" }}>{r.name}</h4>
                                                            <div className="flex items-center gap-xs mt-1">
                                                                {renderStars(r.rating)}
                                                                <span className="text-on-surface-variant font-label-sm ml-xs">({r.rating} ★)</span>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="font-label-sm text-secondary block font-semibold">{r.estimated_cost_display}</span>
                                                            <span className="font-label-sm text-on-surface-variant">{r.city}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-xs">
                                                        {r.cuisines.map(c => (
                                                            <span key={c} className="px-sm py-xs bg-surface-container-highest rounded-full text-label-sm text-on-surface font-semibold">{c}</span>
                                                        ))}
                                                    </div>
                                                    <div className="p-md rounded-xl bg-primary/5 border border-primary/10 italic text-on-surface-variant text-body-md relative mt-2">
                                                        <span className="material-symbols-outlined absolute -top-3 -left-2 text-primary/30 text-[32px]">format_quote</span>
                                                        "{item.explanation}"
                                                    </div>
                                                    <button className="w-full mt-auto py-sm border border-secondary/30 text-secondary rounded-lg font-bold hover:bg-secondary/10 transition-colors flex items-center justify-center gap-base">
                                                        View Details
                                                        <span className="material-symbols-outlined text-[18px]">arrow_forward</span>
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </section>
                            </div>
                        )}

                        {!loading && !error && !response && (
                            <div className="glass-card p-12 rounded-[32px] text-center max-w-2xl mx-auto space-y-6 mt-12">
                                <span className="material-symbols-outlined text-[64px] text-primary">restaurant_menu</span>
                                <h3 className="text-2xl font-bold text-on-surface" style={{ fontFamily: "'Outfit', sans-serif" }}>Aether Dining Recommendation System</h3>
                                <p className="text-on-surface-variant text-base leading-relaxed">
                                    Enter your dining preferences in the sidebar (such as neighborhood, cuisine type, budget constraints, and ambiance keywords) and click <strong>Search</strong> to generate personalized AI-guided restaurant insights.
                                </p>
                            </div>
                        )}

                        {/* Footer section */}
                        <footer className="pt-lg border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-md mt-16">
                            <div className="flex items-center gap-base text-on-surface-variant">
                                <span className="material-symbols-outlined">database</span>
                                <span className="font-label-sm text-label-sm font-semibold">Data refreshed 14 minutes ago. Source: Hugging Face Zomato Dataset</span>
                            </div>
                            <div className="flex gap-lg">
                                <a className="font-label-sm text-label-sm hover:text-primary transition-colors text-on-surface-variant" href="#">API Docs</a>
                                <a className="font-label-sm text-label-sm hover:text-primary transition-colors text-on-surface-variant" href="#">Feedback Loop</a>
                                <a className="font-label-sm text-label-sm hover:text-primary transition-colors text-on-surface-variant" href="#">Privacy Cloud</a>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
